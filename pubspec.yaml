name: journal_windows
description: "好享记账 Windows 桌面版"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  get: ^4.6.6
  
  # 网络请求
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.3.2
  
  # 工具库
  intl: ^0.20.2
  logger: ^2.0.2
  collection: ^1.18.0
  
  # UI组件
  flutter_screenutil: ^5.9.3
  table_calendar: ^3.1.2
  cached_network_image: ^3.3.1
  
  # 设备信息
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  
  # 其他
  url_launcher: ^6.3.1
  connectivity_plus: ^7.0.0
  
  # 文件选择和上传
  file_picker: ^8.0.0
  path: ^1.9.0
  mime: ^2.0.0
  crypto: ^3.0.3
  
  # Excel导出
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
  
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
